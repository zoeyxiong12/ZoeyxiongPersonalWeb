<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #333; }
iframe { width: 100vw; height: 100vh; border: none; }
</style>
</head>
<body>
<iframe src="" id="viewer"></iframe>
<script>
const file = new URLSearchParams(window.location.search).get('file');
document.getElementById('viewer').src = file;
</script>
</body>
</html>
